
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn Hindi — A1/A2 for English Speakers</title>
    <!-- Cache-busting param to force browsers to request new builds during development -->
    <link rel="stylesheet" href="dist/output.css?v=1695490000">
        <!-- Inline fallback styles: ensure the practice area remains beautiful even if external CSS is stale -->
        <style>
            /* Basic layout for practice card */
            #practice-card { max-width: 520px; margin: 1.5rem auto; padding: 2rem; background: linear-gradient(135deg,#f8fafc,#ffffff); border-radius:16px; box-shadow:0 10px 30px rgba(2,6,23,0.06); display:flex; flex-direction:column; align-items:center; }
            #practice-char { width:12rem; height:12rem; display:flex; align-items:center; justify-content:center; background:#fff; border:2px solid #eef2ff; border-radius:16px; box-shadow:0 8px 24px rgba(2,6,23,0.06); font-size:3.75rem; font-weight:700; color:#334155; transition:transform .25s, box-shadow .25s; }
            #practice-char:hover { transform:scale(1.05); box-shadow:0 12px 36px rgba(2,6,23,0.08); }
            #practice-translit { margin-top:.75rem; color:#64748b; font-size:1.125rem; font-weight:500; letter-spacing:.02em; }
            /* Buttons inside the practice card */
            #practice-card button { padding:.6rem 1rem; border-radius:8px; font-weight:600; color:#fff; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:.5rem; margin:.25rem; transition:transform .18s, box-shadow .18s, background .18s; }
            #play-audio { background:#4f46e5; }
            #knew-btn { background:#059669; }
            #didnt-btn { background:#e11d48; }
            #practice-card button:hover { transform:scale(1.03); box-shadow:0 8px 20px rgba(2,6,23,0.08); }
            #practice-card button:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
            @media (max-width:768px) { #practice-char { width:10rem; height:10rem; font-size:3rem; } #practice-card { padding:1.25rem; } }
            .boot-shell { max-width: 52rem; margin: 0 auto; border-radius: 1.5rem; border: 1px solid #e0e7ff; background: linear-gradient(135deg, #f8fafc 0%, #ffffff 60%); box-shadow: 0 16px 40px rgba(15, 23, 42, 0.12); }
            .boot-shell__inner { position: relative; padding: 1.5rem; }
            .boot-shell__brand { margin: 0; color: #4f46e5; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; }
            .boot-shell__title { margin: 0.5rem 0 0; color: #0f172a; font-size: clamp(1.6rem, 1.1rem + 2vw, 2.25rem); line-height: 1.2; }
            .boot-shell__promise { margin: 0.9rem 0 0; max-width: 62ch; color: #475569; font-size: 0.98rem; line-height: 1.5; }
            .boot-shell__status { margin-top: 1.75rem; border: 1px solid #e2e8f0; border-radius: 1rem; background: rgba(248,250,252,0.9); padding: 1rem; }
            .boot-shell__status-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; }
            .boot-shell__status-title { margin: 0; color: #334155; font-size: 0.95rem; font-weight: 600; }
            .boot-shell__status-chip { color: #4f46e5; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
            .boot-shell__track { margin-top: 0.75rem; height: 0.55rem; border-radius: 999px; background: #e2e8f0; overflow: hidden; }
            .boot-shell__progress { width: 40%; height: 100%; border-radius: 999px; background: #4f46e5; animation: boot-progress-sweep 1.8s ease-in-out infinite; will-change: transform; }
            .boot-shell__status-note { margin: 0.75rem 0 0; color: #64748b; font-size: 0.78rem; }
            .boot-shell__noscript { margin: 1rem 0 0; border: 1px solid #fcd34d; border-radius: 0.75rem; background: #fffbeb; color: #78350f; padding: 0.75rem 0.9rem; font-size: 0.9rem; }
            @media (min-width: 640px) { .boot-shell__inner { padding: 2rem; } .boot-shell__status { padding: 1.1rem 1.2rem; } }
            @keyframes boot-progress-sweep {
                0% { transform: translateX(-70%); }
                50% { transform: translateX(15%); }
                100% { transform: translateX(145%); }
            }
            @media (prefers-reduced-motion: reduce) {
                .boot-shell__progress { animation: none; transform: none; width: 55%; }
            }
        </style>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-gradient-to-br from-slate-50 to-white min-h-screen text-slate-900">
    <div id="app" class="container mx-auto max-w-3xl p-4 sm:p-6 lg:p-8">
        <!-- Boot shell shown before JS hydration -->
        <main class="boot-shell" aria-label="Application loading shell">
            <div class="boot-shell__inner">
                <p class="boot-shell__brand">Learn Hindi</p>
                <h1 class="boot-shell__title">नमस्ते · Hindi A1/A2 booting up</h1>
                <p class="boot-shell__promise">Build confident reading and speaking habits with tiny daily lessons, guided practice, and friendly repetition.</p>

                <section class="boot-shell__status" aria-live="polite" aria-busy="true">
                    <div class="boot-shell__status-row">
                        <p class="boot-shell__status-title">Preparing your lesson space…</p>
                        <span class="boot-shell__status-chip">Loading</span>
                    </div>
                    <div class="boot-shell__track" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuetext="Loading application shell">
                        <div class="boot-shell__progress"></div>
                    </div>
                    <p class="boot-shell__status-note">If this takes longer than a few seconds, refresh once and check your connection.</p>
                </section>

                <noscript>
                    <p class="boot-shell__noscript">JavaScript is disabled. You can still read this page, but interactive exercises require enabling JavaScript.</p>
                </noscript>
            </div>
        </main>
    </div>
    <script>
        window.__bootStarted = true;
    </script>
    <script type="module" src="dist/main.js?v=1695490000"></script>
    <script>
        (function setupBootFallback() {
            const timeoutMs = 4000;
            const appEl = document.getElementById('app');
            if (!appEl) return;

            const clearHint = 'If this keeps happening, clear site data/cache and try again.';
            const directUrl = `${location.origin}${location.pathname}`;

            window.setTimeout(() => {
                if (window.__bootOk) return;

                appEl.className = 'max-w-xl mx-auto p-5 bg-white shadow-lg rounded-lg text-slate-800';
                appEl.innerHTML = `
                    <section aria-live="polite">
                        <h1 class="text-xl font-bold mb-2">App failed to start</h1>
                        <p class="text-sm text-slate-600 mb-4">
                            Something went wrong while opening the app. Please try one of these quick fixes.
                        </p>
                        <div class="flex flex-wrap gap-2 mb-4">
                            <button id="boot-reload-btn" class="px-3 py-2 rounded bg-indigo-600 text-white text-sm font-semibold">Reload</button>
                            <a href="${directUrl}" class="px-3 py-2 rounded bg-slate-200 text-slate-800 text-sm font-semibold">Open app directly</a>
                        </div>
                        <p class="text-xs text-slate-500 mb-3">${clearHint}</p>
                        <details class="text-xs text-slate-500">
                            <summary class="cursor-pointer">Diagnostics details</summary>
                            <div class="mt-2 space-y-1">
                                <p>Boot started: ${String(Boolean(window.__bootStarted))}</p>
                                <p>Boot finished: ${String(Boolean(window.__bootOk))}</p>
                                <p>URL: ${location.href}</p>
                            </div>
                        </details>
                    </section>
                `;

                document.getElementById('boot-reload-btn')?.addEventListener('click', () => {
                    location.reload();
                });
            }, timeoutMs);
        })();
    </script>

    <script>
        // During development, automatically unregister any existing service workers on localhost
        // so the page will load the newest CSS/JS without manual DevTools intervention.
        if ('serviceWorker' in navigator) {
            const isLocal = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
            window.addEventListener('load', async () => {
                try {
                    if (isLocal) {
                        const regs = await navigator.serviceWorker.getRegistrations();
                        await Promise.all(regs.map(r => r.unregister().then(() => console.log('Dev: unregistered old SW', r.scope)).catch(() => {})));
                    }

                    // Register the (new) service worker after cleanup
                    navigator.serviceWorker.register('service-worker.js')
                        .then(registration => {
                            console.log('Service Worker registered: ', registration.scope);
                        })
                        .catch(error => {
                            console.error('Service Worker registration failed: ', error);
                        });
                } catch (e) {
                    console.warn('Service Worker dev unregister failed', e);
                }
            });
        }
    </script>
</body>
</html>
